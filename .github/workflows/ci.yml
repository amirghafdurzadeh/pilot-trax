name: Next.js Docker CI/CD

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE_NAME: docker.pilot-trax.ir/pilot-trax:latest
  DOCKER_CONTAINER_NAME: pilot-trax

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE_NAME }} .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to Docker Hub
        run: docker push ${{ env.DOCKER_IMAGE_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            echo "Logging in ${{ secrets.DOCKER_REGISTRY }}"
            docker login ${{ secrets.DOCKER_REGISTRY }} -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} 

            echo "Pulling latest Docker image: ${{ env.DOCKER_IMAGE_NAME }}"
            docker pull ${{ env.DOCKER_IMAGE_NAME }}

            echo "Stopping and removing existing container (if any): ${{ env.DOCKER_CONTAINER_NAME }}"
            docker stop ${{ env.DOCKER_CONTAINER_NAME }} || true
            docker rm ${{ env.DOCKER_CONTAINER_NAME }} || true

            echo "Starting new container from image: ${{ env.DOCKER_IMAGE_NAME }}"
            docker run --detach \
              --name ${{ env.DOCKER_CONTAINER_NAME }} \
              --network nginx-network \
              --restart always \
              ${{ env.DOCKER_IMAGE_NAME }}

            echo "Deployment complete!"